<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>linux-setup</title>
  <meta name="description" content="Install linux-setup, resume, and ai-menu with one command.">
  <meta property="og:title" content="linux-setup">
  <meta property="og:description" content="Install linux-setup, resume, and ai-menu with one command.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --fg: #f1f1ee;
      --muted: #777772;
      --line: #2b2b28;
      --panel: #10100f;
      --hot: #c8ff3d;
      --mono: "SF Mono", "JetBrains Mono", "IBM Plex Mono", Consolas, monospace;
      --sans: "Helvetica Neue", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--fg);
      background: var(--bg);
      font-family: var(--sans);
    }

    main {
      width: min(760px, 100%);
      display: grid;
      gap: 22px;
      justify-items: center;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 10vw, 92px);
      line-height: 0.88;
      letter-spacing: -0.045em;
      font-weight: 900;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .command {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 84px;
      align-items: stretch;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--panel);
    }

    code {
      display: block;
      overflow-x: auto;
      padding: 22px 24px;
      text-align: left;
      color: var(--fg);
      font-family: var(--mono);
      font-size: clamp(13px, 2.6vw, 18px);
      line-height: 1.35;
      white-space: nowrap;
    }

    button {
      border: 0;
      border-left: 1px solid var(--line);
      color: var(--bg);
      background: var(--hot);
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      transition: filter 150ms ease, opacity 180ms ease;
    }

    button.is-fading { opacity: 0; }

    button:active { filter: brightness(0.8); }
    button:focus-visible { outline: 2px solid var(--fg); outline-offset: -5px; }

    footer {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 20px;
      text-align: center;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    footer a:hover { color: var(--fg); }

    @media (max-width: 560px) {
      .command { grid-template-columns: 1fr; }
      button { min-height: 56px; border-left: 0; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <main>
    <h1>linux-setup</h1>
    <div class="command" role="group" aria-label="Install command">
      <code id="install-command">curl -fsSL https://setup.lost.plus/install.sh | bash</code>
      <button id="copy-button" type="button" aria-label="Copy install command">copy</button>
    </div>
    <p>installs linux-setup, resume, and ai-menu</p>
  </main>

  <footer><a href="https://github.com/LPFchan/linux-setup">github</a></footer>

  <script>
    const button = document.getElementById('copy-button');
    const command = document.getElementById('install-command').textContent;

    function fallbackCopy(text) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.top = '-1000px';
      document.body.appendChild(textarea);
      textarea.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(textarea);
      return ok;
    }

    button.addEventListener('click', async () => {
      let copied = false;
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(command);
          copied = true;
        }
      } catch (_) {
        copied = false;
      }

      if (!copied) copied = fallbackCopy(command);

      button.textContent = copied ? '✓' : 'copy?';
      setTimeout(() => {
        button.classList.add('is-fading');
        setTimeout(() => {
          button.textContent = 'copy';
          button.classList.remove('is-fading');
        }, 180);
      }, 900);
    });
  </script>
</body>
</html>
